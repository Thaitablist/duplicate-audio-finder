name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:  # allow manual runs from the Actions tab

defaults:
  run:
    shell: bash  # uniform shell on macOS + Windows runners

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest -q

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Build .app
        run: pyinstaller build/dupaudio.spec --distpath dist --workpath build/_work --noconfirm
      - name: Package .dmg
        run: bash build/make_dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: DuplicateAudioFinder-macOS
          path: dist/DuplicateAudioFinder.dmg
          if-no-files-found: error

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Build .exe
        run: pyinstaller build/dupaudio.spec --distpath dist --workpath build/_work --noconfirm
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build installer
        run: '"/c/Program Files (x86)/Inno Setup 6/ISCC.exe" build/installer.iss'
      - uses: actions/upload-artifact@v4
        with:
          name: DuplicateAudioFinder-Windows
          path: dist/DuplicateAudioFinder-Setup.exe
          if-no-files-found: error

  release:
    # Only when a version tag (e.g. v1.0.0) is pushed: publish a GitHub Release
    # with both installers attached.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(find artifacts -type f)
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            $files
